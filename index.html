<script>
    (function() {
        let maxScroll = 0;
        let clickTargets = [];
        const startTime = Date.now();
        
        window.addEventListener('scroll', () => {
            const scrollPercent = Math.round((window.scrollY / (document.documentElement.scrollHeight - window.innerHeight)) * 100);
            if (scrollPercent > maxScroll) maxScroll = scrollPercent;
        }, { passive: true });

        document.addEventListener('click', (e) => {
            const target = e.target.closest('.btn, a');
            if (target) clickTargets.push(target.innerText.trim().substring(0, 20) || 'link_click');
        }, { passive: true });

        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'hidden') {
                const conn = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
                const payload = {
                    uri: window.location.href,
                    timestamp: new Date().toISOString(),
                    user_agent: navigator.userAgent,
                    referrer: document.referrer || "direct",
                    viewport: `${window.innerWidth}x${window.innerHeight}`,
                    timezone: Intl.DateTimeFormat().resolvedOptions().timeZone || "unknown",
                    device_memory: navigator.deviceMemory || "unknown",
                    hardware_cores: navigator.hardwareConcurrency || "unknown",
                    dwell_seconds: Math.round((Date.now() - startTime) / 1000),
                    scroll_depth: maxScroll,
                    intent_clicks: clickTargets.length > 0 ? clickTargets.join(' | ') : "none",
                    lang_browser: navigator.language || "unknown",
                    network: conn ? conn.effectiveType : "unknown"
                };
                const blob = new Blob([JSON.stringify(payload)], { type: 'application/json' });
                navigator.sendBeacon("https://telemetry.woodfinegroup.com:8082/telemetry-endpoint", blob);
            }
        });
    })();

    async function calculateHash(){
        const isEsp = document.getElementById('lang-toggle').checked;
        const text = document.querySelector(isEsp ? '.lang-es' : '.lang-en').innerText;
        const hashBuffer = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(text));
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        const hashEl = document.getElementById('hash-display');
        if(hashEl) hashEl.innerText = hashHex;
    }
    
    function setCopyrightYear() {
        const yearEl = document.getElementById('current-year');
        if(yearEl) yearEl.textContent = new Date().getFullYear();
    }

    document.getElementById('lang-toggle').addEventListener('change', calculateHash);
    window.addEventListener('DOMContentLoaded', () => {
        calculateHash();
        setCopyrightYear();
    });
</script>

    <time class="release-flag" datetime="2026-03-02">FOR IMMEDIATE RELEASE</time>
    <h1>Woodfine Capital Projects Introduces Direct-Hold Solutions for Regional Real Estate</h1>
    <p><strong>Vancouver, British Columbia - March 2, 2026 -</strong> Woodfine Management Corp. ("Woodfine") has introduced Direct-Hold Solutions as the primary financial model for Woodfine Capital Projects Inc. (the "Promoter").</p>
    <p>The Direct-Hold Solutions serve as the foundational operating entities for the procurement, development, and management of institutional-grade regional real estate. The Direct-Hold Solutions are not investment funds. They are operating enterprises designed to give multi-generational capital direct ownership, long-term security, and independent custodial control over physical assets. At its core, this framework provides the foundation for capital efficiency, Flow-Through Taxation, and real estate syndication.</p>
    
    <h3>The Financial Model</h3>
    <p>Woodfine abandons the traditional structure of layered private equity funds and legacy Joint Ventures. Instead, it is actively deploying a three-pillar financial model comprising the Narrow Bank Model, the Co-Location Mandate, and Regulated Reporting Entities:</p>
    <p><strong>1. Narrow Bank Model:</strong> A secure capital structure designed to eliminate reliance on commercial construction loans. The initial assets are built entirely with perpetual equity. Once lease cash flow stabilizes, the vehicles self-issue Exchange-Traded First Secured Mortgage Debentures. Debt issuance is strictly capped by a mandatory 1.2 Interest Coverage Ratio, funding up to 100% of development costs to date.</p>
    <p><strong>2. Co-Location Mandate:</strong> At the center of this model is a strict Qualified Investment strategy targeting regional markets. These markets possess stable demographic demand for essential services but suffer from a persistent shortfall in institutional-grade construction. Woodfine procures, develops, and manages professional office buildings directly adjacent to major national retailers, such as Walmart, Costco, and Home Depot. By transposing the resilience of daily retail foot traffic onto professional spaces, this strategy secures medical, academic, government, and professional tenants. These sectors are inherently resistant to Work From Home (WFH) and AI disruption because they require physical, in-person operations.</p>
    <p><strong>3. Regulated Reporting Entities:</strong> The vehicles operate strictly as reporting issuers in their respective jurisdictions. This design passes income directly to Investors via Flow-Through Taxation, applying taxation at individual rates rather than at the corporate level. Because the entities are regulated, the Investment Units function as Freely Transferable private equity. Investors retain absolute custodial control without redemption queues or manager-initiated exit mechanics.</p>
    
    <h3>Structural Governance</h3>
    <p>Instead of forcing international capital into a single, multi-jurisdictional fund, the framework utilizes domestic flow-through vehicles. This allows independent Asset Managers and banking syndicates to originate tailored Club Deals, Private SPVs, or local Access Funds. Individual fee models can be applied while integrating foreign capital seamlessly into the Direct-Hold Solutions without transferring international compliance burdens onto the core enterprise.</p>
    
    <h3>Public Financial Disclosure & Capital Efficiency</h3>
    <p>This structure is designed to guarantee direct control and capital preservation. This release serves as a public disclosure establishing the Direct-Hold Solutions framework. The economic model avoids variable performance fees at the enterprise level. Woodfine takes its compensation entirely as Retained Equity—a 10% ownership stake. This preserves the capital structure entirely for the asset, eliminating redundant fees and providing a highly efficient base for independent syndication.</p>

    <p>Woodfine abandona la estructura tradicional de fondos de capital privado en capas y empresas conjuntas heredadas. En su lugar, está desplegando activamente un modelo financiero de tres pilares que comprende el Modelo de Banco Estrecho, el Mandato de Coubicación y las Entidades Emisoras Reguladas:</p>
    <p><strong>1. Modelo de Banco Estrecho:</strong> Una estructura de capital segura diseñada para eliminar la dependencia de los préstamos comerciales de construcción. Los activos iniciales se construyen completamente con capital perpetuo. Una vez que el flujo de caja del arrendamiento se estabiliza, los vehículos autoemiten Obligaciones Hipotecarias Cotizadas en Bolsa. La emisión de deuda está estrictamente limitada por un Índice de Cobertura de Intereses obligatorio de 1.2, financiando hasta el 100% de los costos de desarrollo hasta la fecha.</p>
    <p><strong>2. Mandato de Coubicación:</strong> En el centro de este modelo hay una estricta estrategia de Inversión Calificada dirigida a mercados regionales. Estos mercados poseen una demanda demográfica estable de servicios esenciales, pero sufren de un déficit persistente en la construcción de grado institucional. Woodfine adquiere, desarrolla y administra edificios de oficinas profesionales directamente adyacentes a los principales minoristas nacionales, como Walmart, Costco y Home Depot. Esta estrategia asegura inquilinos médicos, académicos, gubernamentales y profesionales, sectores inherentemente resistentes al trabajo desde casa (WFH) y a la interrupción de la IA porque requieren operaciones físicas presenciales.</p>
    <p><strong>3. Entidades Emisoras Reguladas:</strong> Los vehículos operan estrictamente como emisores de informes en sus respectivas jurisdicciones. Este diseño pasa los ingresos directamente a los inversores aplicando impuestos a sus tasas individuales en lugar de a nivel corporativo. Debido a que las entidades están reguladas, las Unidades de Inversión funcionan como capital privado Libremente Transferible. Los inversores conservan el control de custodia absoluto sin colas de reembolso ni mecanismos de salida iniciados por el administrador.</p>
    
    <h3>Gobernanza Estructural</h3>
    <p>En lugar de forzar el capital internacional en un único fondo multijurisdiccional, el marco utiliza vehículos de flujo continuo nacionales. Esto permite a los Administradores de Activos independientes y sindicatos bancarios originar Acuerdos de Club, SPV Privados o Fondos de Acceso locales adaptados. Pueden aplicar sus propios modelos de tarifas mientras integran capital extranjero sin transferir las cargas de cumplimiento internacional a la empresa principal.</p>
    
    <h3>Divulgación Financiera Pública y Eficiencia de Capital</h3>
    <p>El modelo económico evita tarifas de rendimiento variables a nivel empresarial. Woodfine toma su compensación completamente como Capital Retenido: una participación del 10%. Esto preserva la estructura de capital completamente para el activo, eliminando tarifas redundantes y proporcionando una base altamente eficiente para la sindicación independiente.</p>
`;
